services:
  api:
    build: ./api
    env_file:
      - path: ./api/.env
        required: false
    environment:
      HELIX_DEMO: ${HELIX_DEMO:-true}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build: .
    env_file:
      - path: ./.env
        required: false
    environment:
      API_URL: http://api:8000
      HELIX_DEMO: ${HELIX_DEMO:-true}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
